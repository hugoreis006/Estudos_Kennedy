<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificação de Kennedy – Quiz Odontológico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00c6ff;
    --accent2: #0072ff;
    --gold: #ffd700;
    --green: #00e676;
    --red: #ff4444;
    --text: #e8f4fd;
    --muted: #8ba3be;
    --tooth: #4fc3f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(0,114,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,198,255,0.05) 0%, transparent 50%);
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 32px 20px 16px;
    position: relative;
  }
  .header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin-top: 24px;
  }
  .header h1 {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ===== SCORE BAR ===== */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 16px 20px;
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-item .val {
    font-size: 1.8rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }
  .score-item .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .score-item.correct .val { color: var(--green); }
  .score-item.wrong .val { color: var(--red); }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    padding: 0 20px 8px;
    max-width: 700px;
    margin: 0 auto;
  }
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }

  /* ===== GAME CONTAINER ===== */
  #game {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px 20px 60px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== IMAGE ===== */
  .img-wrap {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
  }
  .img-wrap img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 12px;
    border: 1px solid var(--border);
    object-fit: contain;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .img-badge {
    display: inline-block;
    margin-top: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ===== QUESTION ===== */
  .question-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }
  .step-indicator {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .step-dot.active { background: var(--accent); border-color: var(--accent); }
  .step-dot.done { background: var(--green); border-color: var(--green); }

  .question {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  /* ===== OPTIONS ===== */
  .options {
    display: grid;
    gap: 10px;
  }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,198,255,0.07);
    transform: translateX(4px);
  }
  .option-btn .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) .opt-letter {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(0,230,118,0.1);
    animation: pulse-green 0.4s ease;
  }
  .option-btn.correct .opt-letter {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(255,68,68,0.1);
    animation: shake 0.4s ease;
  }
  .option-btn.wrong .opt-letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: rgba(0,230,118,0.06);
  }
  .option-btn.reveal-correct .opt-letter {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .option-btn:disabled { cursor: default; }

  @keyframes pulse-green {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ===== FEEDBACK ===== */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    display: none;
    animation: fadeIn 0.3s ease;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.3);
    color: var(--green);
  }
  .feedback.fail {
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.3);
    color: #ff8888;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== EXPLANATION ===== */
  .explanation-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-top: 20px;
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .explanation-box.show { display: block; }
  .explanation-box h3 {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }
  .explanation-box p {
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .explanation-box .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .tag {
    background: rgba(0,114,255,0.15);
    border: 1px solid rgba(0,114,255,0.3);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
  }
  .tag.green {
    background: rgba(0,230,118,0.1);
    border-color: rgba(0,230,118,0.3);
    color: var(--green);
  }

  /* ===== NEXT BTN ===== */
  .btn-next {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,114,255,0.4); }
  .btn-next.show { display: block; }

  /* ===== FINAL SCREEN ===== */
  #final {
    display: none;
    text-align: center;
    padding: 40px 20px 60px;
    max-width: 600px;
    margin: 0 auto;
    animation: slideIn 0.5s ease;
  }
  .trophy {
    font-size: 5rem;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
  }
  #final h2 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--gold), #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .final-score {
    font-family: 'Space Mono', monospace;
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--accent);
    margin: 20px 0;
  }
  .final-score span { font-size: 1.5rem; color: var(--muted); }
  .final-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 16px 0 32px;
    flex-wrap: wrap;
  }
  .fstat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    text-align: center;
  }
  .fstat .n { font-size: 2rem; font-weight: 800; font-family: 'Space Mono', monospace; }
  .fstat .l { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .fstat.c .n { color: var(--green); }
  .fstat.e .n { color: var(--red); }
  .btn-restart {
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,114,255,0.4); }

  /* ===== PHASE BADGE ===== */
  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(0,114,255,0.2), rgba(0,198,255,0.1));
    border: 1px solid rgba(0,198,255,0.3);
    border-radius: 20px;
    padding: 4px 14px 4px 8px;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .phase-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== RESULT OVERLAY ===== */
  .result-icon {
    font-size: 2.5rem;
    text-align: center;
    margin: 8px 0;
  }

  /* ===== IMAGE LOADING ===== */
  .img-wrap {
    position: relative;
  }
  .img-skeleton {
    width: 100%;
    max-width: 400px;
    height: 220px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 12px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.8rem;
    gap: 8px;
  }
  .img-skeleton.hidden { display: none; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .img-wrap img.loading { display: none; }
  .img-wrap img.loaded { display: inline-block; }

  /* ===== PRELOAD SCREEN ===== */
  #preload-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 999;
  }
  #preload-screen.hidden { display: none; }
  .preload-bar-wrap {
    width: 260px;
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .preload-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.2s;
  }
  .preload-txt {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .preload-emoji { font-size: 3rem; }
</style>
</head>
<body>

<div id="preload-screen">
  <div class="preload-emoji">🦷</div>
  <div class="preload-txt" id="preload-txt">CARREGANDO IMAGENS…</div>
  <div class="preload-bar-wrap">
    <div class="preload-bar-fill" id="preload-bar" style="width:0%"></div>
  </div>
  <div class="preload-txt" id="preload-count">0 / 16</div>
</div>

<div class="header">
  <h1>🦷 Classificação de Kennedy</h1>
  <div class="subtitle">Quiz de Prostodontia · Edentulismo Parcial</div>
</div>

<div class="score-bar">
  <div class="score-item">
    <div class="val" id="sc-total">0</div>
    <div class="lbl">Questão</div>
  </div>
  <div class="score-item correct">
    <div class="val" id="sc-correct">0</div>
    <div class="lbl">Acertos</div>
  </div>
  <div class="score-item wrong">
    <div class="val" id="sc-wrong">0</div>
    <div class="lbl">Erros</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="prog-text">0 / 16</div>
</div>

<div id="game"></div>
<div id="final"></div>

<script>

// ===== KENNEDY EXPLANATIONS =====
const EXPLANATIONS = {
  1: {
    title: "Classe I de Kennedy",
    desc: "Área edêntula bilateral posterior aos dentes naturais remanescentes. Extremidade livre bilateral — não há dentes posteriores dos dois lados para suporte distal.",
    tags: ["Extremidade Livre Bilateral", "Posterior", "Sem suporte distal"]
  },
  2: {
    title: "Classe II de Kennedy",
    desc: "Área edêntula unilateral posterior aos dentes naturais remanescentes. Extremidade livre unilateral — apenas um lado não possui dentes posteriores.",
    tags: ["Extremidade Livre Unilateral", "Posterior", "Um lado afetado"]
  },
  3: {
    title: "Classe III de Kennedy",
    desc: "Área edêntula unilateral com dentes naturais remanescentes anteriores e posteriores à área. Extremidade suportada bilateralmente por dentes.",
    tags: ["Extremidade Suportada", "Unilateral", "Dentes em ambos os lados"]
  },
  4: {
    title: "Classe IV de Kennedy",
    desc: "Área edêntula única e bilateral (cruza a linha média) anterior aos dentes remanescentes. Não admite modificações por definição da própria classe.",
    tags: ["Anterior", "Cruza linha média", "Sem modificações possíveis"]
  }
};

const MOD_EXPLANATIONS = {
  0: "Sem áreas edêntulas adicionais além da classificação principal.",
  1: "Uma área edêntula adicional além da classificação principal.",
  2: "Duas áreas edêntulas adicionais além da classificação principal.",
  3: "Três áreas edêntulas adicionais além da classificação principal.",
  4: "Quatro áreas edêntulas adicionais além da classificação principal."
};

// ===== GAME STATE =====
const ALL_IMAGES = [
  {key:"c1_m0", classe:1, mod:0},
  {key:"c1_m1", classe:1, mod:1},
  {key:"c1_m2", classe:1, mod:2},
  {key:"c1_m3", classe:1, mod:3},
  {key:"c1_m4", classe:1, mod:4},
  {key:"c2_m0", classe:2, mod:0},
  {key:"c2_m1", classe:2, mod:1},
  {key:"c2_m2", classe:2, mod:2},
  {key:"c2_m3", classe:2, mod:3},
  {key:"c2_m4", classe:2, mod:4},
  {key:"c3_m0", classe:3, mod:0},
  {key:"c3_m1", classe:3, mod:1},
  {key:"c3_m2", classe:3, mod:2},
  {key:"c3_m3", classe:3, mod:3},
  {key:"c3_m4", classe:3, mod:4},
  {key:"c4_m0", classe:4, mod:0},
];

let queue = [];
let current = null;
let phase = 1; // 1 = identify class, 2 = identify mods
let classeAnswered = false;
let classeCorrect = false;
let totalAnswered = 0;
let correctCount = 0;
let wrongCount = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== IMAGE PRELOADER =====
const imageCache = {};

function preloadAllImages(callback) {
  const total = ALL_IMAGES.length;
  let loaded = 0;

  ALL_IMAGES.forEach(item => {
    const img = new Image();
    imageCache[item.key] = img;
    img.onload = img.onerror = () => {
      loaded++;
      const pct = Math.round((loaded / total) * 100);
      document.getElementById('preload-bar').style.width = pct + '%';
      document.getElementById('preload-count').textContent = `${loaded} / ${total}`;
      if (loaded === total) {
        setTimeout(() => {
          document.getElementById('preload-screen').classList.add('hidden');
          callback();
        }, 300);
      }
    };
    img.src = `images/${item.key}.jpeg`;
  });
}

function startGame() {
  queue = shuffle([...ALL_IMAGES]);
  totalAnswered = 0; correctCount = 0; wrongCount = 0;
  updateScore();
  document.getElementById('final').style.display = 'none';
  document.getElementById('game').style.display = '';
  nextQuestion();
}

function nextQuestion() {
  if (queue.length === 0) {
    showFinal();
    return;
  }
  current = queue.shift();
  phase = 1;
  classeAnswered = false;
  classeCorrect = false;
  renderQuestion();
}

function renderQuestion() {
  const game = document.getElementById('game');
  const exp = EXPLANATIONS[current.classe];

  // Build options
  let classOptions, modOptions;

  if (phase === 1) {
    classOptions = [1,2,3,4];
  } else {
    modOptions = shuffle([0,1,2,3,4]);
  }

  const letters = ['A','B','C','D','E'];

  let html = `<div class="card">
    <div class="img-wrap">
      <div class="img-skeleton" id="img-skeleton">⏳ Carregando imagem…</div>
      <img src="images/${current.key}.jpeg" alt="Radiografia Kennedy" class="loading"
        onload="this.classList.remove('loading');this.classList.add('loaded');document.getElementById('img-skeleton').classList.add('hidden');"
        onerror="this.src='images/${current.key}.jpeg';"/>
      <div class="img-badge">🦷 Caso #${totalAnswered + 1} de ${ALL_IMAGES.length}</div>
    </div>`;

  if (phase === 1) {
    html += `
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <div class="question-label">FASE 1 DE 2</div>
    <div class="phase-badge"><span class="phase-dot"></span>Identificar Classe</div>
    <div class="question">Qual é a Classe de Kennedy desta arcada?</div>
    <div class="options" id="opts">`;
    classOptions.forEach((cls, i) => {
      html += `<button class="option-btn" onclick="answerClasse(${cls}, this)" id="opt_${cls}">
        <span class="opt-letter">${letters[i]}</span>
        Classe ${['I','II','III','IV'][cls-1]} de Kennedy
      </button>`;
    });
    html += `</div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-next show" id="btn-to-phase2" style="display:none" onclick="goPhase2()">
      Próxima Fase →
    </div>`;
  } else {
    // Phase 2
    const maxMod = current.classe === 4 ? 0 : 4;
    const availMods = maxMod === 0 ? [0] : modOptions.filter(m => m <= 4);
    
    html += `
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>
    <div class="question-label">FASE 2 DE 2</div>
    <div class="phase-badge"><span class="phase-dot"></span>Contar Modificações</div>
    <div class="question">Quantas modificações tem esta Classe de Kennedy?</div>
    <div class="options" id="opts">`;
    
    const modList = current.classe === 4 ? [0] : [0,1,2,3,4];
    modList.forEach((m, i) => {
      const label = m === 0 ? '0 modificações (sem modificações)' : `${m} modificação${m > 1 ? 'ões' : ''}`;
      html += `<button class="option-btn" onclick="answerMod(${m}, this)" id="mopt_${m}">
        <span class="opt-letter">${letters[i]}</span>
        ${label}
      </button>`;
    });
    html += `</div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation-box" id="expbox"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">
      ${queue.length === 0 ? 'Ver Resultado Final 🏆' : 'Próxima Imagem →'}
    </button>`;
  }

  html += `</div>`;
  game.innerHTML = html;
  updateProgress();
}

function answerClasse(chosen, btn) {
  if (classeAnswered) return;
  classeAnswered = true;
  const correct = current.classe;
  const isRight = chosen === correct;

  disableAll('opts');

  if (isRight) {
    btn.classList.add('correct');
    classeCorrect = true;
    correctCount++;
    showFeedback('ok', '✅ Correto! Você identificou a classe certa.');
  } else {
    btn.classList.add('wrong');
    classeCorrect = false;
    wrongCount++;
    showFeedback('fail', `❌ Errou! Era a Classe ${['I','II','III','IV'][correct-1]} de Kennedy.`);
    const correctBtn = document.getElementById(`opt_${correct}`);
    if (correctBtn) correctBtn.classList.add('reveal-correct');
  }

  totalAnswered++;
  updateScore();
  document.getElementById('btn-to-phase2').style.display = 'block';
}

function goPhase2() {
  if (current.classe === 4) {
    // Classe IV has no mods, skip or auto
    phase = 2;
    renderQuestion();
  } else {
    phase = 2;
    renderQuestion();
  }
}

function answerMod(chosen, btn) {
  const correct = current.mod;
  const isRight = chosen === correct;

  disableAll('opts');

  if (isRight) {
    btn.classList.add('correct');
    correctCount++;
    showFeedback('ok', `✅ Correto! ${correct === 0 ? 'Nenhuma modificação.' : `${correct} modificação${correct>1?'ões':''}.`}`);
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    showFeedback('fail', `❌ Errou! São ${correct} modificação${correct===1?'':'ões'}.`);
    const cb = document.getElementById(`mopt_${correct}`);
    if (cb) cb.classList.add('reveal-correct');
  }

  totalAnswered++;
  updateScore();
  showExplanation();

  const nxt = document.getElementById('btn-next');
  if (nxt) nxt.classList.add('show');
}

function showExplanation() {
  const box = document.getElementById('expbox');
  if (!box) return;
  const exp = EXPLANATIONS[current.classe];
  const modExp = MOD_EXPLANATIONS[current.mod];
  
  box.innerHTML = `
    <h3>📚 Explicação</h3>
    <p><strong style="color:var(--text)">${exp.title}</strong><br>${exp.desc}</p>
    <p style="margin-top:10px;"><strong style="color:var(--text)">Modificações:</strong> ${modExp}</p>
    <div class="tags">
      ${exp.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      <span class="tag green">${current.mod} mod.</span>
    </div>`;
  box.classList.add('show');
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  fb.textContent = msg;
  fb.className = `feedback show ${type}`;
}

function disableAll(containerId) {
  document.querySelectorAll(`#${containerId} .option-btn`).forEach(b => b.disabled = true);
}

function updateScore() {
  document.getElementById('sc-total').textContent = totalAnswered;
  document.getElementById('sc-correct').textContent = correctCount;
  document.getElementById('sc-wrong').textContent = wrongCount;
}

function updateProgress() {
  const done = ALL_IMAGES.length - queue.length - 1;
  const total = ALL_IMAGES.length;
  const pct = Math.max(0, (done / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${Math.max(0, done)} / ${total}`;
}

function showFinal() {
  document.getElementById('game').style.display = 'none';
  const total = totalAnswered;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  let trophy = '🥉', msg = 'Continue estudando!';
  if (pct >= 90) { trophy = '🏆'; msg = 'Excelente! Domínio total!'; }
  else if (pct >= 70) { trophy = '🥇'; msg = 'Muito bem! Ótimo desempenho!'; }
  else if (pct >= 50) { trophy = '🥈'; msg = 'Bom trabalho! Pode melhorar!'; }

  const fin = document.getElementById('final');
  fin.style.display = 'block';
  fin.innerHTML = `
    <div class="trophy">${trophy}</div>
    <h2>${msg}</h2>
    <div class="final-score">${pct}<span>%</span></div>
    <div class="final-stats">
      <div class="fstat c"><div class="n">${correctCount}</div><div class="l">Acertos</div></div>
      <div class="fstat e"><div class="n">${wrongCount}</div><div class="l">Erros</div></div>
      <div class="fstat"><div class="n">${total}</div><div class="l">Total</div></div>
    </div>
    <button class="btn-restart" onclick="startGame()">🔄 Jogar Novamente</button>`;

  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-text').textContent = `${ALL_IMAGES.length} / ${ALL_IMAGES.length}`;
}

// Start!
preloadAllImages(() => startGame());
</script>
</body>
</html>
